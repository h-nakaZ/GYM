<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>モトジムカーナ計算</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: auto;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 1.15em;
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* 3つ並び（分・秒・ミリ） */
        .row-3 {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .row-3 > div {
            flex: 1;
            position: relative;
        }

        /* 2つ並び（整数・小数） */
        .row-2 {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .row-2 > div:nth-child(1) {
            flex: 3;
        }

        .row-2 > div:nth-child(2) {
            flex: 1;
            position: relative;
        }

        /* 入力欄（老眼・屋外対策） */
        input {
            width: 100%;
            padding: 18px 5px;
            box-sizing: border-box;
            text-align: center;

            border: 2px solid #666;
            border-radius: 6px;

            font-size: 28px;
            font-weight: bold;

            background: #fff;
            color: #000;
        }

        input:focus {
            outline: none;
            border-color: #004a99;
            box-shadow: 0 0 4px rgba(0,74,153,0.4);
        }

        /* 桁数ガイド */
        .digit-guide::after {
            content: attr(data-placeholder);
            position: absolute;
            right: 8px;
            top: 6px;
            color: #999;
            pointer-events: none;
            font-size: 0.75em;
        }

        /* 結果表示 */
        #result {
            margin-top: 20px;
            padding: 20px;

            background: #004a99;
            color: white;

            border-radius: 5px;

            font-size: 2.2em;
            text-align: center;
            font-weight: bold;
        }

        /* 参考表 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #f0f0f0;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h3>モトジムカーナ計算</h3>

<label>TOPタイム</label>
<div class="row-3">
    <div>
        <input type="number" id="topM" placeholder="分" oninput="saveAndCalc()">
    </div>

    <div class="digit-guide" data-placeholder="2桁">
        <input type="number" id="topS" placeholder="秒"
               oninput="limit(this,2); saveAndCalc()">
    </div>

    <div class="digit-guide" data-placeholder="3桁">
        <input type="number" id="topMs" placeholder="ミリ"
               oninput="limit(this,3); saveAndCalc()">
    </div>
</div>

<label>TOPタイムを何％に設定？</label>
<div class="row-2">
    <div>
        <input type="number" id="baseP_int" placeholder="整数"
               oninput="saveAndCalc()">
    </div>

    <div class="digit-guide" data-placeholder="2桁">
        <input type="number" id="baseP_dec" placeholder="小数"
               oninput="limit(this,2); saveAndCalc()">
    </div>
</div>

<label>あなたのタイム</label>
<div class="row-3">
    <div>
        <input type="number" id="myM" placeholder="分"
               oninput="saveAndCalc()">
    </div>

    <div class="digit-guide" data-placeholder="2桁">
        <input type="number" id="myS" placeholder="秒"
               oninput="limit(this,2); saveAndCalc()">
    </div>

    <div class="digit-guide" data-placeholder="3桁">
        <input type="number" id="myMs" placeholder="ミリ"
               oninput="limit(this,3); saveAndCalc()">
    </div>
</div>

<div id="result">
    あなたの％　---
</div>

<table>
    <thead>
        <tr>
            <th>参考％</th>
            <th>参考タイム</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>

function limit(el, max) {
    if (el.value.length > max) {
        el.value = el.value.slice(0, max);

        const next =
            el.parentElement.nextElementSibling?.querySelector('input');

        if (next) next.focus();
    }
}

function saveAndCalc() {

    const ids = [
        'topM',
        'topS',
        'topMs',
        'baseP_int',
        'baseP_dec',
        'myM',
        'myS',
        'myMs'
    ];

    ids.forEach(id => {
        localStorage.setItem(
            id,
            document.getElementById(id).value
        );
    });

    calculate();
}

window.onload = () => {

    [
        'topM',
        'topS',
        'topMs',
        'baseP_int',
        'baseP_dec',
        'myM',
        'myS',
        'myMs'
    ].forEach(id => {

        const val = localStorage.getItem(id);

        if (val) {
            document.getElementById(id).value = val;
        }
    });

    calculate();
};

function calculate() {

    const topMs =
        (parseInt(document.getElementById('topM').value || 0) * 60000) +
        (parseInt(document.getElementById('topS').value || 0) * 1000) +
        parseInt(document.getElementById('topMs').value || 0);

    const myMs =
        (parseInt(document.getElementById('myM').value || 0) * 60000) +
        (parseInt(document.getElementById('myS').value || 0) * 1000) +
        parseInt(document.getElementById('myMs').value || 0);

    const baseP =
        parseFloat(
            (document.getElementById('baseP_int').value || 0) +
            "." +
            (document.getElementById('baseP_dec').value || 0)
        );

    if (topMs === 0 || myMs === 0 || baseP === 0) {
        return;
    }

    const virtual100Ms =
        topMs / (baseP / 100);

    const myPercent =
        ((myMs / virtual100Ms) * 100).toFixed(2);

    document.getElementById('result').innerText =
        `あなたの％: ${myPercent}％`;

    const rates = [
        100,
        105,
        107,
        110,
        115,
        120,
        125,
        130
    ];

    const tbody =
        document.getElementById('tableBody');

    tbody.innerHTML = '';

    rates.forEach(r => {

        const ms =
            virtual100Ms * (r / 100);

        const m =
            Math.floor(ms / 60000);

        const s =
            Math.floor((ms % 60000) / 1000);

        const mil =
            Math.floor(ms % 1000);

        tbody.innerHTML += `
            <tr>
                <td>${r}％</td>
                <td>
                    ${m}:${s.toString().padStart(2,'0')}.${mil.toString().padStart(3,'0')}
                </td>
            </tr>
        `;
    });
}

</script>

</body>
</html>
